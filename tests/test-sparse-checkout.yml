name: Test sparse checkout
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          repository: actions/checkout
          ref: main
          path: checkout-target
          sparse-checkout: |
            action.yml
            README.md
          sparse-checkout-cone-mode: false
      - name: Assert checkout directory exists
        run: |
          if [ ! -d "$GITHUB_WORKSPACE/checkout-target" ]; then
            echo "FAIL: checkout-target directory not found"
            exit 1
          fi
          echo "PASS: directory exists"
      - name: Assert action.yml is present (included in sparse checkout)
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/checkout-target/action.yml" ]; then
            echo "FAIL: action.yml not found in sparse checkout"
            exit 1
          fi
          echo "PASS: action.yml found"
      - name: Assert README.md is present (included in sparse checkout)
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/checkout-target/README.md" ]; then
            echo "FAIL: README.md not found in sparse checkout"
            exit 1
          fi
          echo "PASS: README.md found"
      - name: Assert src directory is NOT present (excluded from sparse checkout)
        run: |
          if [ -d "$GITHUB_WORKSPACE/checkout-target/src" ]; then
            echo "FAIL: src directory should not be present in sparse checkout"
            exit 1
          fi
          echo "PASS: src directory correctly excluded"
      - name: Assert commit output is set
        env:
          ACTUAL: ${{ steps.action.outputs.commit }}
        run: |
          echo "actual commit: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: commit output is empty"
            exit 1
          fi
          echo "PASS: commit output is set"
