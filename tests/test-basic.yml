name: Test basic checkout
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          repository: actions/checkout
          ref: main
          path: checkout-target
      - name: Assert checkout directory exists
        run: |
          echo "Checking checkout-target directory..."
          if [ ! -d "$GITHUB_WORKSPACE/checkout-target" ]; then
            echo "FAIL: checkout-target directory not found"
            exit 1
          fi
          echo "PASS: directory exists"
      - name: Assert action.yml exists in checked-out repo
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/checkout-target/action.yml" ]; then
            echo "FAIL: action.yml not found in checkout-target"
            exit 1
          fi
          echo "PASS: action.yml found"
      - name: Assert commit output is set
        env:
          COMMIT: ${{ steps.action.outputs.commit }}
        run: |
          echo "commit: $COMMIT"
          if [ -z "$COMMIT" ]; then
            echo "FAIL: commit output is empty"
            exit 1
          fi
          # Verify it looks like a SHA (40 hex chars)
          if ! echo "$COMMIT" | grep -qE '^[0-9a-f]{40}$'; then
            echo "FAIL: commit output does not look like a SHA: $COMMIT"
            exit 1
          fi
          echo "PASS: commit output is a valid SHA"
      - name: Assert ref output is set
        env:
          REF: ${{ steps.action.outputs.ref }}
        run: |
          echo "ref: $REF"
          if [ -z "$REF" ]; then
            echo "FAIL: ref output is empty"
            exit 1
          fi
          echo "PASS: ref output is set"
