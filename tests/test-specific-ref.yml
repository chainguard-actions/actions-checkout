name: Test checkout at specific ref
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          repository: actions/checkout
          ref: v4.2.2
          path: checkout-target
      - name: Assert checkout directory exists
        run: |
          if [ ! -d "$GITHUB_WORKSPACE/checkout-target" ]; then
            echo "FAIL: checkout-target directory not found"
            exit 1
          fi
          echo "PASS: directory exists"
      - name: Assert commit output is set
        env:
          ACTUAL: ${{ steps.action.outputs.commit }}
        run: |
          echo "actual commit: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: commit output is empty"
            exit 1
          fi
          # Verify it looks like a SHA (40 hex chars)
          if ! echo "$ACTUAL" | grep -qE '^[0-9a-f]{40}$'; then
            echo "FAIL: commit output does not look like a SHA: $ACTUAL"
            exit 1
          fi
          echo "PASS: commit output is a valid SHA"
      - name: Assert ref output matches requested tag
        env:
          ACTUAL: ${{ steps.action.outputs.ref }}
        run: |
          echo "actual ref: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: ref output is empty"
            exit 1
          fi
          echo "PASS: ref output is set to $ACTUAL"
      - name: Assert git log shows correct commit
        run: |
          cd "$GITHUB_WORKSPACE/checkout-target"
          COMMIT=$(git rev-parse HEAD)
          echo "HEAD commit: $COMMIT"
          if [ -z "$COMMIT" ]; then
            echo "FAIL: could not get HEAD commit"
            exit 1
          fi
          echo "PASS: git log works"
