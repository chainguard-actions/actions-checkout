name: Test checkout with full history
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          repository: actions/checkout
          ref: main
          path: checkout-full-history
          fetch-depth: 0
      - name: Assert checkout directory exists
        run: |
          if [ ! -d "$GITHUB_WORKSPACE/checkout-full-history" ]; then
            echo "FAIL: checkout-full-history directory not found"
            exit 1
          fi
          echo "PASS: directory exists"
      - name: Assert full history was fetched
        run: |
          cd "$GITHUB_WORKSPACE/checkout-full-history"
          COUNT=$(git log --oneline | wc -l | tr -d ' ')
          echo "commit count: $COUNT"
          if [ "$COUNT" -le 1 ]; then
            echo "FAIL: expected more than 1 commit with fetch-depth=0, got $COUNT"
            exit 1
          fi
          echo "PASS: full history fetched ($COUNT commits)"
      - name: Assert commit output is set
        env:
          COMMIT: ${{ steps.action.outputs.commit }}
        run: |
          echo "commit: $COMMIT"
          if [ -z "$COMMIT" ]; then
            echo "FAIL: commit output is empty"
            exit 1
          fi
          if ! echo "$COMMIT" | grep -qE '^[0-9a-f]{40}$'; then
            echo "FAIL: commit output does not look like a SHA: $COMMIT"
            exit 1
          fi
          echo "PASS: commit output is a valid SHA"
