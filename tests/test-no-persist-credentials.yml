name: Test actions/checkout - No Persist Credentials

on:
  workflow_dispatch:

jobs:
  test-no-persist-credentials:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - name: Checkout this repository to access local action
        uses: actions/checkout@v4

      - name: Checkout public repository without persisting credentials using local action
        id: checkout
        uses: ./__ACTION_SRC__
        with:
          repository: actions/checkout
          ref: main
          path: no-creds-checkout
          persist-credentials: false

      - name: Assert commit output is set
        env:
          COMMIT_OUT: ${{ steps.checkout.outputs.commit }}
        run: |
          echo "commit output: $COMMIT_OUT"
          if [ -z "$COMMIT_OUT" ]; then
            echo "FAIL: commit output is empty"
            exit 1
          fi
          if ! echo "$COMMIT_OUT" | grep -qE '^[0-9a-f]{40}$'; then
            echo "FAIL: commit output does not look like a SHA: $COMMIT_OUT"
            exit 1
          fi
          echo "PASS: commit output is a valid SHA"

      - name: Assert repository files exist
        run: |
          echo "Workspace contents:"
          ls -la "$GITHUB_WORKSPACE/no-creds-checkout"
          if [ ! -f "$GITHUB_WORKSPACE/no-creds-checkout/action.yml" ]; then
            echo "FAIL: action.yml not found in checkout path"
            exit 1
          fi
          echo "PASS: repository files are present"

      - name: Assert no token stored in git config for checked-out repo
        run: |
          # With persist-credentials=false, there should be no extraheader with token
          EXTRA_HEADER=$(git -C "$GITHUB_WORKSPACE/no-creds-checkout" config --local http.https://github.com/.extraheader 2>/dev/null || echo "")
          echo "extraheader: '$EXTRA_HEADER'"
          if [ -n "$EXTRA_HEADER" ]; then
            echo "FAIL: credentials were persisted in git config despite persist-credentials=false"
            exit 1
          fi
          echo "PASS: no credentials stored in git config"
